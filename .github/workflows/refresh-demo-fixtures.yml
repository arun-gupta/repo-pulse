name: Refresh demo fixtures

on:
  # Weekly — Mondays at 09:00 UTC. Keeps the /demo route current (issue #213).
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

env:
  # Opt into Node.js 24 for JavaScript actions (checkout, setup-node,
  # create-pull-request) ahead of the June 2026 default switch.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate demo fixtures
        env:
          # Built-in GITHUB_TOKEN works for public-repo reads.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run demo:fixtures

      - name: Open PR with refreshed fixtures
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(demo): weekly refresh of /demo fixtures'
          title: 'chore(demo): weekly refresh of /demo fixtures'
          branch: chore/demo-fixture-refresh
          delete-branch: true
          body: |
            Automated weekly refresh of the `/demo` route fixtures (issue #213).

            Regenerated from the locked roster of 6 repos + 1 org. Review the
            diff for anything unexpected before merging.
          add-paths: |
            fixtures/demo/**
