name: Daily Tech Debt Audit

on:
  # 08:00 UTC = midnight PDT / 01:00 AM PST
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      new-count: ${{ steps.diff.outputs.new-count }}
      issue-number: ${{ steps.create-issue.outputs.issue-number }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download previous fingerprint artifact
        uses: dawidd6/action-download-artifact@v20
        with:
          workflow: daily-tech-debt-audit.yml
          name: tech-debt-fingerprint
          path: .prev-artifact/
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Run tech-debt analysis
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          FINDINGS_OUTPUT: findings.json
        run: npx tsx scripts/tech-debt-audit.ts

      - name: Upload findings for auto-fix job
        uses: actions/upload-artifact@v7
        with:
          name: tech-debt-findings
          path: findings.json
          retention-days: 1

      - name: Compute new findings
        id: diff
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "date=$TODAY" >> "$GITHUB_OUTPUT"

          jq -r '.fingerprints[]' findings.json 2>/dev/null | sort > /tmp/today-fps.txt || touch /tmp/today-fps.txt

          if [ -f .prev-artifact/fingerprint.json ]; then
            jq -r '.[]' .prev-artifact/fingerprint.json 2>/dev/null | sort > /tmp/prev-fps.txt || touch /tmp/prev-fps.txt
          else
            touch /tmp/prev-fps.txt
          fi

          comm -23 /tmp/today-fps.txt /tmp/prev-fps.txt > /tmp/new-fps.txt
          NEW_COUNT=$(wc -l < /tmp/new-fps.txt | tr -d ' ')
          echo "new-count=$NEW_COUNT" >> "$GITHUB_OUTPUT"

          PREV_ISSUE=""
          if [ -f .prev-artifact/last-issue.txt ]; then
            PREV_ISSUE=$(cat .prev-artifact/last-issue.txt)
          fi
          echo "prev-issue=$PREV_ISSUE" >> "$GITHUB_OUTPUT"

          echo "New findings: $NEW_COUNT (previous issue: ${PREV_ISSUE:-none})"

      - name: Format issue body
        if: steps.diff.outputs.new-count != '0'
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - "$RUN_URL" <<'PYEOF' > /tmp/issue-body.md
          import json, sys

          run_url = sys.argv[1]

          with open('findings.json') as f:
              data = json.load(f)

          all_findings = data.get('findings', [])
          all_fingerprints = data.get('fingerprints', [])
          date = data.get('date', '')
          total_all = len(all_findings)

          # Filter to new findings only (fingerprints in /tmp/new-fps.txt)
          try:
              with open('/tmp/new-fps.txt') as nf:
                  new_fps = set(line.strip() for line in nf if line.strip())
          except FileNotFoundError:
              new_fps = set(all_fingerprints)

          fp_map = {fp: f for fp, f in zip(all_fingerprints, all_findings)}
          findings = [fp_map[fp] for fp in new_fps if fp in fp_map]
          new_count = len(findings)

          SEVERITIES = ['fix-now', 'fix-soon', 'low-priority']
          CONFIDENCES = ['high', 'medium', 'low']
          ICONS = {'fix-now': '🚨', 'fix-soon': '⚠️', 'low-priority': 'ℹ️'}
          TOP_N = 5

          def conf(f): return f.get('confidence', 'low')
          def sev(f): return f.get('severity', 'low-priority')

          # Severity × confidence counts
          sev_counts = {s: len([f for f in findings if sev(f) == s]) for s in SEVERITIES}
          high_fix_now = [f for f in findings if sev(f) == 'fix-now' and conf(f) == 'high']

          total_note = f' ({total_all} total across all runs)' if total_all != new_count else ''
          lines = [
              f'Automated tech-debt audit — **{new_count} new finding{"s" if new_count != 1 else ""}** on {date}{total_note}.',
              f'**{len(high_fix_now)}** are high-confidence fix-now — up to 2 consolidated auto-fix PRs will be opened: one for source fixes (DRY/CONSISTENCY/PATTERNS) and one for missing tests (MISSING_TESTS).',
              '',
              '## Summary',
              '',
              '| Severity | Total new | 🔴 high conf | 🟡 medium conf | 🟢 low conf |',
              '|---|---|---|---|---|',
          ]
          for s in SEVERITIES:
              by_sev = [f for f in findings if sev(f) == s]
              h = sum(1 for f in by_sev if conf(f) == 'high')
              m = sum(1 for f in by_sev if conf(f) == 'medium')
              lo = sum(1 for f in by_sev if conf(f) == 'low')
              lines.append(f'| {ICONS[s]} {s} | {len(by_sev)} | {h} | {m} | {lo} |')

          # Category breakdown (new, high-confidence only)
          cats: dict[str, dict[str, int]] = {}
          for f in [x for x in findings if conf(x) == 'high']:
              cat = f.get('category', '?')
              cats.setdefault(cat, {s: 0 for s in SEVERITIES})
              cats[cat][sev(f)] = cats[cat].get(sev(f), 0) + 1

          if cats:
              lines += [
                  '',
                  '## High-confidence findings by category',
                  '',
                  '| Category | 🚨 fix-now | ⚠️ fix-soon | ℹ️ low-priority |',
                  '|---|---|---|---|',
              ]
              for cat, sc in sorted(cats.items()):
                  lines.append(f'| {cat} | {sc.get("fix-now",0)} | {sc.get("fix-soon",0)} | {sc.get("low-priority",0)} |')

          # Top high-confidence fix-now items inline
          if high_fix_now:
              shown = high_fix_now[:TOP_N]
              lines += ['', f'## 🚨 Top fix-now (high confidence — showing {len(shown)} of {len(high_fix_now)})', '']
              for item in shown:
                  lines.append(f'- **{item["id"]}** `{item["file"]}:{item["lineStart"]}` — {item["description"]}')
                  lines.append(f'  > {item["recommendation"]}')
              if len(high_fix_now) > TOP_N:
                  lines.append(f'\n_...and {len(high_fix_now) - TOP_N} more in the artifact._')

          lines += [
              '',
              '---',
              f'📎 [View workflow run & artifacts]({run_url}) (includes findings.json, 7-day retention)',
          ]

          print('\n'.join(lines))
          PYEOF

      - name: Ensure labels exist
        if: steps.diff.outputs.new-count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "techdebt" --color "#e4e669" --description "Technical debt" 2>/dev/null || true
          gh label create "automated" --color "#0075ca" --description "Created by automated workflow" 2>/dev/null || true

      - name: Create issue for new findings
        if: steps.diff.outputs.new-count != '0'
        id: create-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY="${{ steps.diff.outputs.date }}"
          COUNT="${{ steps.diff.outputs.new-count }}"
          ISSUE_URL=$(gh issue create \
            --title "[Tech Debt Audit] $TODAY — $COUNT new findings" \
            --body-file /tmp/issue-body.md \
            --label "techdebt" \
            --label "automated")
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "issue-number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Created issue #$ISSUE_NUMBER: $ISSUE_URL"

      - name: Comment on previous issue (no new findings)
        if: steps.diff.outputs.new-count == '0' && steps.diff.outputs.prev-issue != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY="${{ steps.diff.outputs.date }}"
          PREV_ISSUE="${{ steps.diff.outputs.prev-issue }}"
          gh issue comment "$PREV_ISSUE" --body "No new debt detected on $TODAY."

      - name: Save artifact state
        run: |
          mkdir -p artifact
          jq '.fingerprints' findings.json > artifact/fingerprint.json
          cp findings.json artifact/findings.json
          ISSUE="${{ steps.create-issue.outputs.issue-number }}"
          if [ -z "$ISSUE" ]; then
            ISSUE="${{ steps.diff.outputs.prev-issue }}"
          fi
          echo "$ISSUE" > artifact/last-issue.txt

      - name: Upload fingerprint artifact
        uses: actions/upload-artifact@v7
        with:
          name: tech-debt-fingerprint
          path: artifact/
          retention-days: 7

  auto-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: audit
    if: needs.audit.outputs.new-count != '0'

    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download findings artifact
        uses: actions/download-artifact@v8
        with:
          name: tech-debt-findings

      - name: Open auto-fix PRs for top high-confidence findings
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FINDINGS_OUTPUT: findings.json
          TECH_DEBT_ISSUE: ${{ needs.audit.outputs.issue-number }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npx tsx scripts/tech-debt-fix.ts
